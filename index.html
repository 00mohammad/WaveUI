<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave UI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="./dist/output.css" />
  </head>

  <body class="bg-bg font-[Manrope] text-white">

    <header
      class="h-screen bg-cover bg-center bg-fixed"
      style="background-image: url('./src/img/Frame1.png')">

      <!-- Navbar -->
      <nav
        class="relative flex items-center justify-between px-6 py-5 lg:px-8 lg:py-11 xl:px-[200px]">

        <!-- Logo -->
        <div class="flex items-center gap-2.5">
          <img
            src="./src/svg/Mask group.svg"
            alt="Oceanica Logo"
            class="h-7 w-8" />
          <h1 class="text-4xl font-bold">Oceanica</h1>
        </div>

        <!-- Desktop Menu -->
        <ul
          class="absolute left-1/2 hidden -translate-x-1/2 items-center gap-8 text-2xl md:flex">
          <li class="cursor-pointer transition-colors hover:text-primary">
            Home
          </li>
          <li class="cursor-pointer transition-colors hover:text-primary">
            Tours
          </li>
          <li class="cursor-pointer transition-colors hover:text-primary">
            Contact
          </li>
        </ul>

        <!-- Desktop Button -->
        <a
          href="#"
          class="ml-auto hidden text-2xl font-bold text-primary transition-opacity hover:opacity-80 md:block">
          Start a Journey
        </a>

        <!-- Mobile Hamburger -->
        <button
          class="group ml-auto rounded-lg p-2 transition-colors md:hidden"
          aria-label="Open menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8 transition-colors group-hover:text-primary"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

      </nav>

      <!-- Hero -->
      <div class="px-6 mt-2.5 lg:px-8 xl:px-[200px]">

        <h2
          class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-[1.1]  md:text-center lg:text-left">
          Discover the
          <span class="inline md:block md:mt-3">water</span>
        </h2>

        <p
          class="mt-8 max-w-lg mx-auto lg:mx-0 text-base sm:text-lg md:text-xl lg:text-2xl xl:text-3xl leading-[1.7] font-medium text-gray-200 md:text-center lg:text-left">
          From pristine waters to majestic forests... we have it all.
        </p>

      </div>

    </header>

    <script src="./src/script.js"></script>

  </body>
</html>
