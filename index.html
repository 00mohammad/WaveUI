<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave UI</title>
    <link rel="stylesheet" href="./dist/output.css" />
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white shadow">
        <nav class="max-w-7xl mx-auto px-4 py-6">
          <h1 class="text-3xl font-bold text-primary">Wave UI</h1>
          <p class="text-gray-600 mt-2">Tailwind CSS v4 با پشتیبانی فارسی</p>
        </nav>
      </header>

      <main class="flex-1 max-w-7xl mx-auto px-4 py-12 w-full">
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div
            class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition"
          >
            <h2 class="text-xl font-semibold text-primary mb-3">
              🎨 طراحی مدرن
            </h2>
            <p class="text-gray-600">
              رابط کاربری زیبا و کاربرپسند با Tailwind CSS
            </p>
          </div>

          <div
            class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition"
          >
            <h2 class="text-xl font-semibold text-secondary mb-3">⚡ سریع</h2>
            <p class="text-gray-600">بارگذاری فوری و عملکرد بهینه</p>
          </div>

          <div
            class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition"
          >
            <h2 class="text-xl font-semibold text-primary mb-3">
              📱 Responsive
            </h2>
            <p class="text-gray-600">کاملاً سازگار با تمام دستگاه‌ها</p>
          </div>
        </section>

        <section class="mt-12">
          <h2 class="text-2xl font-bold mb-6">شروع سریع</h2>
          <div class="bg-gray-900 text-gray-100 p-6 rounded-lg overflow-auto">
            <pre><code>npm install
npm run dev
npm run build</code></pre>
          </div>
        </section>
      </main>

      <footer class="bg-gray-900 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center">
          <p>Wave UI © 2026 - ساخته شده با Tailwind CSS v4</p>
        </div>
      </footer>
    </div>
    <script src="./src/script.js"></script>
  </body>
</html>
